stages:
- verify
- security

verify:
  image: python:3.12
  stage: verify
  script:
  - python3 -m compileall src tests
  - PYTHONPATH=src python3 -m unittest discover -s tests -v

sast:
  stage: security

include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: security
